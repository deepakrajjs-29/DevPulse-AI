name: DevPulse AI Daily Portfolio Automation

on:
  schedule:
    # Runs daily at UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  update-portfolio:
    name: DevPulse AI Telemetry & README Generator
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Automated Unit Tests
        run: |
          python -m unittest discover -s tests

      - name: Run DevPulse AI Portfolio Engine
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          python main.py --verbose

      - name: Detect Changed Artifacts & Auto-Commit
        run: |
          # Check if output artifacts were modified
          if [ -n "$(git status --porcelain output/)" ]; then
            echo "Changes detected in output artifacts. Staging and committing..."
            git config user.name "deepakrajjs-29"
            git config user.email "deepakrajjs2909@gmail.com"
            git add output/
            git commit -m "chore(portfolio): auto-update analytics and README [skip ci]" || exit 0
            git pull --rebase origin main
            git push origin HEAD:main
            echo "Successfully updated portfolio telemetry and dynamic README!"
          else
            echo "No changes detected in portfolio telemetry. Skipping commit."
          fi
